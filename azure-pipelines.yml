# Azure DevOps CI/CD Pipeline — frntnd-ts (React + Vite frontend)
# Builds the app and uploads the dist/ folder to an Azure Storage Account
# configured as a static website ($web container).

trigger:
  branches:
    include:
      - main

variables:
  azureSubscription:   'YOUR_SERVICE_CONNECTION_NAME'   # ← same service connection as backend, or a separate one
  storageAccountName:  'YOUR_STORAGE_ACCOUNT_NAME'      # ← your Azure Storage Account name (e.g. tbbifrontend)
  nodeVersion:         '20.x'

pool:
  vmImage: 'ubuntu-latest'   # ← or use  name: 'YOUR_POOL_NAME'  for a self-hosted pool

stages:

# ──────────────────────────────────────────────
# Stage 1 — Build
# ──────────────────────────────────────────────
- stage: Build
  displayName: 'Build frontend'
  jobs:
  - job: BuildJob
    displayName: 'npm install & build'
    steps:

    - task: NodeTool@0
      displayName: 'Use Node.js $(nodeVersion)'
      inputs:
        versionSpec: '$(nodeVersion)'

    - script: npm ci
      displayName: 'Install dependencies'

    - script: npm run build
      displayName: 'Build production bundle'

    - publish: 'dist'
      displayName: 'Upload dist artifact'
      artifact: frontend-dist

# ──────────────────────────────────────────────
# Stage 2 — Deploy to Azure Storage static site
# ──────────────────────────────────────────────
- stage: Deploy
  displayName: 'Deploy to Storage Account'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployJob
    displayName: 'Upload to $web container'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:

          # Clear old files from $web container
          - task: AzureCLI@2
            displayName: 'Delete old blobs in $web'
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az storage blob delete-batch \
                  --account-name $(storageAccountName) \
                  --source '$web' \
                  --auth-mode login

          # Upload new build files
          - task: AzureCLI@2
            displayName: 'Upload dist/ to $web'
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az storage blob upload-batch \
                  --account-name $(storageAccountName) \
                  --destination '$web' \
                  --source '$(Pipeline.Workspace)/frontend-dist' \
                  --auth-mode login \
                  --overwrite true

          # Set correct content types for web assets
          - task: AzureCLI@2
            displayName: 'Set content-type for JS/CSS files'
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                # Ensure JS files have correct MIME type
                az storage blob list \
                  --account-name $(storageAccountName) \
                  --container-name '$web' \
                  --auth-mode login \
                  --query "[?ends_with(name, '.js')].name" -o tsv | \
                while read blob; do
                  az storage blob update \
                    --account-name $(storageAccountName) \
                    --container-name '$web' \
                    --name "$blob" \
                    --content-type "application/javascript" \
                    --auth-mode login
                done

                # Ensure CSS files have correct MIME type
                az storage blob list \
                  --account-name $(storageAccountName) \
                  --container-name '$web' \
                  --auth-mode login \
                  --query "[?ends_with(name, '.css')].name" -o tsv | \
                while read blob; do
                  az storage blob update \
                    --account-name $(storageAccountName) \
                    --container-name '$web' \
                    --name "$blob" \
                    --content-type "text/css" \
                    --auth-mode login
                done
