# Azure DevOps CI/CD Pipeline — frntnd-ts (React + Vite frontend)
# Builds the app and uploads the dist/ folder to an Azure Storage Account
# configured as a static website ($web container).

trigger:
  branches:
    include:
      - main

variables:
  azureSubscription:   'YOUR_SERVICE_CONNECTION_NAME'   # ← same service connection as backend, or a separate one
  storageAccountName:  'YOUR_STORAGE_ACCOUNT_NAME'      # ← your Azure Storage Account name (e.g. tbbifrontend)
  nodeVersion:         '20.x'

pool:
  vmImage: 'ubuntu-latest'   # ← or use  name: 'YOUR_POOL_NAME'  for a self-hosted pool

stages:

# ──────────────────────────────────────────────
# Stage 1 — Build
# ──────────────────────────────────────────────
- stage: Build
  displayName: 'Build frontend'
  jobs:
  - job: BuildJob
    displayName: 'npm install & build'
    steps:

    - task: NodeTool@0
      displayName: 'Use Node.js $(nodeVersion)'
      inputs:
        versionSpec: '$(nodeVersion)'

    - script: npm ci
      displayName: 'Install dependencies'

    - script: npm run build
      displayName: 'Build production bundle'

    - publish: 'dist'
      displayName: 'Upload dist artifact'
      artifact: frontend-dist

# ──────────────────────────────────────────────
# Stage 2 — Deploy to Azure Storage static site
# ──────────────────────────────────────────────
- stage: Deploy
  displayName: 'Deploy to Storage Account'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployJob
    displayName: 'Upload to $web container'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:

          - task: AzureCLI@2
            displayName: 'Deploy to static website'
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'pscore'
              scriptLocation: 'inlineScript'
              inlineScript: |
                $container = '$web'
                $account   = '$(storageAccountName)'
                $source    = '$(Pipeline.Workspace)/frontend-dist'

                # Get storage account key
                $key = (az storage account keys list --account-name $account --query "[0].value" -o tsv)
                Write-Host "✅ Got account key for $account"

                # Clear old files
                az storage blob delete-batch --account-name $account --account-key $key --source $container
                Write-Host "✅ Cleared old blobs from $container"

                # Upload new build files
                az storage blob upload-batch --account-name $account --account-key $key --destination $container --source $source --overwrite true
                Write-Host "✅ Uploaded build files to $container"

                # Verify: list blobs to confirm upload
                $count = (az storage blob list --account-name $account --account-key $key --container-name $container --query "length(@)" -o tsv)
                Write-Host "✅ Verification: $count blobs now in $container"
